<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar / Cadastrar — VerificaFato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-logo .brand-icon-lg {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #27AE60, #229954);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.75rem; color: #fff;
            margin: 0 auto 0.75rem;
        }
        .auth-logo h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
        .auth-logo p  { font-size: 0.85rem; opacity: 0.7; margin: 0.25rem 0 0; }

        .auth-tabs {
            display: flex;
            background: rgba(0,0,0,0.15);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
            gap: 4px;
        }
        .auth-tab-btn {
            flex: 1; padding: 0.6rem;
            background: transparent; border: none;
            color: var(--text-muted); border-radius: 9px;
            font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all 0.25s;
        }
        .auth-tab-btn.active {
            background: linear-gradient(135deg, #27AE60, #229954);
            color: #fff;
        }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        .field-auth { margin-bottom: 1.25rem; }
        .field-auth label {
            display: block; font-size: 0.85rem; font-weight: 600;
            margin-bottom: 0.4rem; opacity: 0.9;
        }
        .field-auth .input-icon-wrap {
            position: relative;
        }
        .field-auth .input-icon-wrap i {
            position: absolute; left: 0.9rem; top: 50%;
            transform: translateY(-50%); opacity: 0.5; font-size: 0.9rem;
        }
        .field-auth input {
            width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: rgba(255,255,255,0.1) !important;
            border: 1px solid var(--border) !important;
            border-radius: 10px !important;
            color: var(--text-main) !important;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-auth input:focus {
            outline: none;
            border-color: #27AE60 !important;
            box-shadow: 0 0 0 3px rgba(39,174,96,0.2) !important;
        }
        .field-auth input::placeholder { color: var(--text-muted) !important; }

        .btn-auth {
            width: 100%; padding: 0.85rem;
            background: linear-gradient(135deg, #27AE60, #229954);
            border: none; border-radius: 12px;
            color: #fff; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.25s;
            margin-top: 0.5rem;
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(39,174,96,0.4); }
        .btn-auth:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

        .divider { text-align: center; margin: 1rem 0; opacity: 0.5; font-size: 0.8rem; }

        .msg-box {
            padding: 0.75rem 1rem; border-radius: 10px;
            font-size: 0.85rem; margin-bottom: 1rem; display: none;
        }
        .msg-box.error   { background: rgba(231,76,60,0.2); border: 1px solid rgba(231,76,60,0.4); color: #ff7675; }
        .msg-box.success { background: rgba(39,174,96,0.2); border: 1px solid rgba(39,174,96,0.4); color: #55efc4; }
        .msg-box.show    { display: block; }

        .back-home { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.85rem; opacity: 0.65; transition: opacity 0.2s; }
        .back-home:hover { opacity: 1; }

        .pwd-toggle {
            position: absolute; right: 0.9rem; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            padding: 0; font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div id="alertContainer" class="position-fixed top-0 start-50 translate-middle-x p-3" style="z-index:2000;" aria-live="polite"></div>

    <header class="site-header">
        <div class="container header-shell">
            <a class="brand-link" href="/">
                <span class="brand-icon"><i class="fas fa-shield-halved"></i></span>
                <span>VerificaFato</span>
            </a>
            <div id="theme-toggle-container" class="theme-toggle-inline ms-auto"></div>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="brand-icon-lg"><i class="fas fa-shield-halved"></i></div>
                <h1>VerificaFato</h1>
                <p>Combatendo desinformação no Oeste do Paraná</p>
            </div>

            <div class="auth-tabs" role="tablist">
                <button class="auth-tab-btn active" id="tabEntrar" onclick="showTab('entrar')">
                    <i class="fas fa-sign-in-alt me-1"></i> Entrar
                </button>
                <button class="auth-tab-btn" id="tabCadastrar" onclick="showTab('cadastrar')">
                    <i class="fas fa-user-plus me-1"></i> Cadastrar
                </button>
            </div>

            <!-- ── ENTRAR ── -->
            <div id="panelEntrar" class="form-panel active">
                <div id="msgEntrar" class="msg-box"></div>
                <div class="field-auth">
                    <label for="loginEmail">E-mail</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
                    </div>
                </div>
                <div class="field-auth">
                    <label for="loginSenha">Senha</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginSenha" placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="pwd-toggle" onclick="toggleSenha('loginSenha',this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button class="btn-auth" id="btnEntrar" onclick="fazerLogin()">
                    <span class="btn-text"><i class="fas fa-sign-in-alt me-2"></i>Entrar</span>
                    <span class="d-none spinner-border spinner-border-sm" id="spinEntrar"></span>
                </button>
                <p class="divider">— ou —</p>
                <p style="text-align:center;font-size:0.85rem;opacity:0.7">Não tem conta? <a href="#" onclick="showTab('cadastrar')" style="color:#27AE60;font-weight:600">Cadastre-se grátis</a></p>
            </div>

            <!-- ── CADASTRAR ── -->
            <div id="panelCadastrar" class="form-panel">
                <div id="msgCadastrar" class="msg-box"></div>
                <div class="field-auth">
                    <label for="cadNome">Nome completo</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="cadNome" placeholder="Seu nome" autocomplete="name">
                    </div>
                </div>
                <div class="field-auth">
                    <label for="cadEmail">E-mail</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="cadEmail" placeholder="seu@email.com" autocomplete="email">
                    </div>
                </div>
                <div class="field-auth">
                    <label for="cadCidade">Cidade <span style="font-weight:400;opacity:0.6;font-size:0.8rem">(opcional)</span></label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-map-pin"></i>
                        <input type="text" id="cadCidade" placeholder="Ex.: Cascavel" autocomplete="address-level2">
                    </div>
                </div>
                <div class="field-auth">
                    <label for="cadSenha">Senha <span style="font-weight:400;opacity:0.6;font-size:0.8rem">(mín. 6 caracteres)</span></label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="cadSenha" placeholder="••••••••" autocomplete="new-password">
                        <button type="button" class="pwd-toggle" onclick="toggleSenha('cadSenha',this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="field-auth">
                    <label for="cadSenha2">Confirmar senha</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="cadSenha2" placeholder="••••••••" autocomplete="new-password">
                        <button type="button" class="pwd-toggle" onclick="toggleSenha('cadSenha2',this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button class="btn-auth" id="btnCadastrar" onclick="fazerCadastro()">
                    <span class="btn-text"><i class="fas fa-user-plus me-2"></i>Criar conta</span>
                    <span class="d-none spinner-border spinner-border-sm" id="spinCadastrar"></span>
                </button>
                <p class="divider">— ou —</p>
                <p style="text-align:center;font-size:0.85rem;opacity:0.7">Já tem conta? <a href="#" onclick="showTab('entrar')" style="color:#27AE60;font-weight:600">Entrar</a></p>
            </div>

            <a href="/" class="back-home"><i class="fas fa-arrow-left me-1"></i> Voltar à verificação</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dark-mode.js"></script>
    <script>
        // Redireciona se já está logado
        const token = localStorage.getItem('vf-token');
        const user = JSON.parse(localStorage.getItem('vf-user') || 'null');
        if (token && user) {
            window.location.href = user.role === 'admin' ? '/Admin.html' : '/';
        }

        function showTab(tab) {
            document.getElementById('panelEntrar').classList.toggle('active', tab === 'entrar');
            document.getElementById('panelCadastrar').classList.toggle('active', tab === 'cadastrar');
            document.getElementById('tabEntrar').classList.toggle('active', tab === 'entrar');
            document.getElementById('tabCadastrar').classList.toggle('active', tab === 'cadastrar');
        }

        function toggleSenha(inputId, btn) {
            const inp = document.getElementById(inputId);
            const show = inp.type === 'password';
            inp.type = show ? 'text' : 'password';
            btn.innerHTML = `<i class="fas fa-eye${show ? '-slash' : ''}"></i>`;
        }

        function mostrarMsg(id, texto, tipo) {
            const el = document.getElementById(id);
            el.textContent = texto;
            el.className = `msg-box ${tipo} show`;
        }

        function setLoadingBtn(btnId, spinId, on) {
            const btn  = document.getElementById(btnId);
            const spin = document.getElementById(spinId);
            btn.disabled = on;
            btn.querySelector('.btn-text').classList.toggle('d-none', on);
            spin.classList.toggle('d-none', !on);
        }

        async function fazerLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const senha = document.getElementById('loginSenha').value;
            if (!email || !senha) return mostrarMsg('msgEntrar', 'Preencha e-mail e senha.', 'error');

            setLoadingBtn('btnEntrar', 'spinEntrar', true);
            try {
                const res  = await fetch('/api/auth/entrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                const data = await res.json();
                if (!data.sucesso) return mostrarMsg('msgEntrar', data.erro, 'error');

                localStorage.setItem('vf-token',   data.token);
                localStorage.setItem('vf-user',    JSON.stringify(data.usuario));
                mostrarMsg('msgEntrar', 'Login realizado! Redirecionando...', 'success');

                const destino = data.usuario.role === 'admin' ? '/admin.html' : '/';
                setTimeout(() => window.location.href = destino, 800);
            } catch (e) {
                mostrarMsg('msgEntrar', 'Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoadingBtn('btnEntrar', 'spinEntrar', false);
            }
        }

        async function fazerCadastro() {
            const nome   = document.getElementById('cadNome').value.trim();
            const email  = document.getElementById('cadEmail').value.trim();
            const cidade = document.getElementById('cadCidade').value.trim();
            const senha  = document.getElementById('cadSenha').value;
            const senha2 = document.getElementById('cadSenha2').value;

            if (!nome || !email || !senha) return mostrarMsg('msgCadastrar', 'Preencha os campos obrigatórios.', 'error');
            if (senha !== senha2) return mostrarMsg('msgCadastrar', 'As senhas não coincidem.', 'error');
            if (senha.length < 6) return mostrarMsg('msgCadastrar', 'A senha deve ter pelo menos 6 caracteres.', 'error');

            setLoadingBtn('btnCadastrar', 'spinCadastrar', true);
            try {
                const res  = await fetch('/api/auth/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha, cidade })
                });
                const data = await res.json();
                if (!data.sucesso) return mostrarMsg('msgCadastrar', data.erro, 'error');

                localStorage.setItem('vf-token',   data.token);
                localStorage.setItem('vf-user',    JSON.stringify(data.usuario));
                mostrarMsg('msgCadastrar', 'Conta criada! Redirecionando...', 'success');
                setTimeout(() => window.location.href = '/', 800);
            } catch (e) {
                mostrarMsg('msgCadastrar', 'Erro de conexão. Tente novamente.', 'error');
            } finally {
                setLoadingBtn('btnCadastrar', 'spinCadastrar', false);
            }
        }

        // Permite Enter nos inputs
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const isEntrar = document.getElementById('panelEntrar').classList.contains('active');
                isEntrar ? fazerLogin() : fazerCadastro();
            }
        });
    </script>
</body>
</html>
